<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="1200" height="700" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="600" y="35" fill="#e0e0e0" font-size="18" font-weight="bold" text-anchor="middle">Row-Level Security & Governance</text>
  <text x="600" y="55" fill="#8892b0" font-size="12" text-anchor="middle">Dynamic RLS by organizational hierarchy | Workspace governance &amp; deployment pipelines</text>

  <!-- RLS Architecture - Left Section -->
  <rect x="30" y="80" width="560" height="340" fill="#16213e" rx="8"/>
  <text x="50" y="108" fill="#e0e0e0" font-size="14" font-weight="bold">Dynamic Row-Level Security</text>
  <text x="50" y="125" fill="#8892b0" font-size="11">Each user sees only their scope based on org hierarchy</text>

  <!-- Org Hierarchy -->
  <!-- CEO Level -->
  <rect x="230" y="145" width="180" height="35" fill="#64ffda" rx="6" opacity="0.15"/>
  <text x="320" y="167" fill="#64ffda" font-size="12" text-anchor="middle" font-weight="bold">CEO — All Data</text>

  <line x1="260" y1="180" x2="160" y2="210" stroke="#2a3a5e" stroke-width="1.5"/>
  <line x1="380" y1="180" x2="480" y2="210" stroke="#2a3a5e" stroke-width="1.5"/>

  <!-- VP Level -->
  <rect x="70" y="210" width="180" height="35" fill="#bb86fc" rx="6" opacity="0.15"/>
  <text x="160" y="232" fill="#bb86fc" font-size="11" text-anchor="middle">VP Sales — Sales Data</text>

  <rect x="390" y="210" width="180" height="35" fill="#bb86fc" rx="6" opacity="0.15"/>
  <text x="480" y="232" fill="#bb86fc" font-size="11" text-anchor="middle">VP Ops — Ops Data</text>

  <line x1="110" y1="245" x2="80" y2="275" stroke="#2a3a5e" stroke-width="1"/>
  <line x1="200" y1="245" x2="230" y2="275" stroke="#2a3a5e" stroke-width="1"/>
  <line x1="430" y1="245" x2="400" y2="275" stroke="#2a3a5e" stroke-width="1"/>
  <line x1="520" y1="245" x2="550" y2="275" stroke="#2a3a5e" stroke-width="1"/>

  <!-- Manager Level -->
  <rect x="40" y="275" width="100" height="28" fill="#ff7043" rx="4" opacity="0.15"/>
  <text x="90" y="294" fill="#ff7043" font-size="9" text-anchor="middle">Region East</text>
  <rect x="185" y="275" width="100" height="28" fill="#ff7043" rx="4" opacity="0.15"/>
  <text x="235" y="294" fill="#ff7043" font-size="9" text-anchor="middle">Region West</text>
  <rect x="355" y="275" width="100" height="28" fill="#ff7043" rx="4" opacity="0.15"/>
  <text x="405" y="294" fill="#ff7043" font-size="9" text-anchor="middle">Plant A</text>
  <rect x="500" y="275" width="100" height="28" fill="#ff7043" rx="4" opacity="0.15"/>
  <text x="550" y="294" fill="#ff7043" font-size="9" text-anchor="middle">Plant B</text>

  <!-- DAX RLS Expression -->
  <text x="50" y="330" fill="#e0e0e0" font-size="12" font-weight="bold">RLS DAX Expression</text>
  <rect x="50" y="340" width="525" height="65" fill="#0a192f" rx="6"/>
  <text x="65" y="360" fill="#8892b0" font-size="10" font-family="Consolas, monospace">[SecurityTable]</text>
  <text x="65" y="378" fill="#64ffda" font-size="10" font-family="Consolas, monospace">FILTER EXPRESSION:</text>
  <text x="65" y="396" fill="#e0e0e0" font-size="10" font-family="Consolas, monospace">[UserEmail] = USERPRINCIPALNAME()</text>

  <!-- Workspace Governance - Right Section -->
  <rect x="610" y="80" width="560" height="340" fill="#16213e" rx="8"/>
  <text x="630" y="108" fill="#e0e0e0" font-size="14" font-weight="bold">Workspace & Deployment Architecture</text>
  <text x="630" y="125" fill="#8892b0" font-size="11">Structured workspaces with deployment pipelines</text>

  <!-- Deployment Pipeline -->
  <rect x="640" y="145" width="160" height="70" fill="#0a192f" rx="8" stroke="#ffd54f" stroke-width="1.5"/>
  <text x="720" y="170" fill="#ffd54f" font-size="12" text-anchor="middle" font-weight="bold">Development</text>
  <text x="720" y="190" fill="#8892b0" font-size="10" text-anchor="middle">Build &amp; iterate</text>
  <text x="720" y="205" fill="#8892b0" font-size="9" text-anchor="middle">Dev workspace</text>

  <text x="815" y="185" fill="#64ffda" font-size="16">→</text>

  <rect x="840" y="145" width="150" height="70" fill="#0a192f" rx="8" stroke="#ff7043" stroke-width="1.5"/>
  <text x="915" y="170" fill="#ff7043" font-size="12" text-anchor="middle" font-weight="bold">Test / UAT</text>
  <text x="915" y="190" fill="#8892b0" font-size="10" text-anchor="middle">Validate &amp; review</text>
  <text x="915" y="205" fill="#8892b0" font-size="9" text-anchor="middle">Test workspace</text>

  <text x="1005" y="185" fill="#64ffda" font-size="16">→</text>

  <rect x="1030" y="145" width="120" height="70" fill="#0a192f" rx="8" stroke="#4caf50" stroke-width="1.5"/>
  <text x="1090" y="170" fill="#4caf50" font-size="12" text-anchor="middle" font-weight="bold">Production</text>
  <text x="1090" y="190" fill="#8892b0" font-size="10" text-anchor="middle">Live reports</text>
  <text x="1090" y="205" fill="#8892b0" font-size="9" text-anchor="middle">Prod workspace</text>

  <!-- Security Groups -->
  <text x="630" y="245" fill="#e0e0e0" font-size="12" font-weight="bold">Security Group Mapping</text>

  <rect x="640" y="258" width="510" height="28" fill="#0a192f" rx="4"/>
  <text x="655" y="277" fill="#64ffda" font-size="10" font-weight="bold">SG-BI-Admins</text>
  <text x="800" y="277" fill="#8892b0" font-size="10">Full access to all workspaces</text>
  <text x="1060" y="277" fill="#e0e0e0" font-size="10">Admin</text>

  <rect x="640" y="292" width="510" height="28" fill="#0a192f" rx="4"/>
  <text x="655" y="311" fill="#bb86fc" font-size="10" font-weight="bold">SG-BI-Contributors</text>
  <text x="800" y="311" fill="#8892b0" font-size="10">Dev + Test workspaces</text>
  <text x="1060" y="311" fill="#e0e0e0" font-size="10">Contributor</text>

  <rect x="640" y="326" width="510" height="28" fill="#0a192f" rx="4"/>
  <text x="655" y="345" fill="#ffd54f" font-size="10" font-weight="bold">SG-BI-Viewers</text>
  <text x="800" y="345" fill="#8892b0" font-size="10">Production workspace only</text>
  <text x="1060" y="345" fill="#e0e0e0" font-size="10">Viewer</text>

  <rect x="640" y="360" width="510" height="28" fill="#0a192f" rx="4"/>
  <text x="655" y="379" fill="#ff7043" font-size="10" font-weight="bold">SG-BI-Executive</text>
  <text x="800" y="379" fill="#8892b0" font-size="10">Production + all data visibility (no RLS filter)</text>
  <text x="1060" y="379" fill="#e0e0e0" font-size="10">Viewer</text>

  <!-- Governance Checklist -->
  <rect x="30" y="440" width="560" height="230" fill="#16213e" rx="8"/>
  <text x="50" y="468" fill="#e0e0e0" font-size="14" font-weight="bold">Governance Framework</text>

  <text x="50" y="498" fill="#4caf50" font-size="11">✓ Deployment pipelines — no direct edits to production</text>
  <text x="50" y="522" fill="#4caf50" font-size="11">✓ Sensitivity labels applied to all datasets</text>
  <text x="50" y="546" fill="#4caf50" font-size="11">✓ Incremental refresh configured — no full dataset reloads</text>
  <text x="50" y="570" fill="#4caf50" font-size="11">✓ Endorsement tags (Certified / Promoted) on trusted content</text>
  <text x="50" y="594" fill="#4caf50" font-size="11">✓ Usage metrics monitoring — track adoption &amp; stale reports</text>
  <text x="50" y="618" fill="#4caf50" font-size="11">✓ Naming conventions enforced across workspaces</text>
  <text x="50" y="642" fill="#4caf50" font-size="11">✓ Data lineage documented from source → model → report</text>

  <!-- Testing Matrix -->
  <rect x="610" y="440" width="560" height="230" fill="#16213e" rx="8"/>
  <text x="630" y="468" fill="#e0e0e0" font-size="14" font-weight="bold">RLS Validation Matrix</text>
  <text x="630" y="485" fill="#8892b0" font-size="11">Tested with "View as Role" for each security group</text>

  <!-- Test Results Table -->
  <rect x="625" y="498" width="530" height="25" fill="#0a192f" rx="4"/>
  <text x="640" y="515" fill="#64ffda" font-size="10" font-weight="bold">TEST USER</text>
  <text x="800" y="515" fill="#64ffda" font-size="10" font-weight="bold">EXPECTED</text>
  <text x="970" y="515" fill="#64ffda" font-size="10" font-weight="bold">ACTUAL</text>
  <text x="1090" y="515" fill="#64ffda" font-size="10" font-weight="bold">STATUS</text>

  <text x="640" y="543" fill="#e0e0e0" font-size="10">CEO@company.com</text>
  <text x="800" y="543" fill="#8892b0" font-size="10">All 4 units</text>
  <text x="970" y="543" fill="#8892b0" font-size="10">All 4 units</text>
  <text x="1090" y="543" fill="#4caf50" font-size="10">✓ Pass</text>

  <text x="640" y="567" fill="#e0e0e0" font-size="10">vp.sales@company.com</text>
  <text x="800" y="567" fill="#8892b0" font-size="10">Sales only</text>
  <text x="970" y="567" fill="#8892b0" font-size="10">Sales only</text>
  <text x="1090" y="567" fill="#4caf50" font-size="10">✓ Pass</text>

  <text x="640" y="591" fill="#e0e0e0" font-size="10">mgr.east@company.com</text>
  <text x="800" y="591" fill="#8892b0" font-size="10">East region</text>
  <text x="970" y="591" fill="#8892b0" font-size="10">East region</text>
  <text x="1090" y="591" fill="#4caf50" font-size="10">✓ Pass</text>

  <text x="640" y="615" fill="#e0e0e0" font-size="10">analyst@company.com</text>
  <text x="800" y="615" fill="#8892b0" font-size="10">Own dept only</text>
  <text x="970" y="615" fill="#8892b0" font-size="10">Own dept only</text>
  <text x="1090" y="615" fill="#4caf50" font-size="10">✓ Pass</text>

  <rect x="625" y="635" width="530" height="22" fill="#4caf50" rx="4" opacity="0.1"/>
  <text x="640" y="651" fill="#4caf50" font-size="10" font-weight="bold">All RLS tests passed — 300+ users onboarded with correct data visibility</text>

  <!-- Wireframe label -->
  <rect x="0" y="688" width="1200" height="12" fill="#0a192f"/>
  <text x="600" y="698" fill="#8892b0" font-size="9" text-anchor="middle">WIREFRAME MOCKUP — Row-Level Security &amp; Governance | Access control architecture (data redacted under NDA)</text>
</svg>